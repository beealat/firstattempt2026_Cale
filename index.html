<!DOCTYPE html>
<html lang="en" ng-app="adduApp">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ADDU Nation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body ng-controller="Main">

<!-- ═══════════════════════════════════════
     TEMPLATES (ng-template inline partials)
═══════════════════════════════════════ -->

<script type="text/ng-template" id="tpl/login.html">
<!-- ═══════════════════════════════════════
     LOGIN
═══════════════════════════════════════ -->
<div class="login-wrap">
  <div class="login-card">
    <div class="login-top">
      <!-- ADDU Crest SVG - exact match to screenshot -->
      <svg class="crest-svg" viewBox="0 0 120 136" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- IHS top circle -->
        <circle cx="60" cy="13" r="11" stroke="white" stroke-width="1.5" fill="none"/>
        <text x="60" y="18" text-anchor="middle" fill="white" font-size="8" font-weight="700" font-family="serif">IHS</text>
        <!-- Main shield -->
        <path d="M8 24 L112 24 L112 88 Q60 128 8 88 Z" stroke="white" stroke-width="2" fill="none"/>
        <!-- Horizontal divider -->
        <line x1="8" y1="56" x2="112" y2="56" stroke="white" stroke-width="1.5"/>
        <!-- Vertical divider -->
        <line x1="60" y1="24" x2="60" y2="116" stroke="white" stroke-width="1.5"/>
        <!-- Top-left: crossed keys -->
        <line x1="20" y1="31" x2="50" y2="53" stroke="white" stroke-width="1.5"/>
        <line x1="50" y1="31" x2="20" y2="53" stroke="white" stroke-width="1.5"/>
        <circle cx="20" cy="31" r="3" fill="white"/>
        <circle cx="50" cy="31" r="3" fill="white"/>
        <circle cx="20" cy="53" r="3" fill="white"/>
        <circle cx="50" cy="53" r="3" fill="white"/>
        <!-- Top-right: mountain/wave -->
        <path d="M66 35 Q72 28 80 32 Q88 28 94 35" stroke="white" stroke-width="1.5" fill="none"/>
        <path d="M64 45 Q72 37 80 42 Q88 37 96 45" stroke="white" stroke-width="1.5" fill="none"/>
        <ellipse cx="80" cy="50" rx="6" ry="3" fill="white" opacity=".6"/>
        <!-- Bottom-left: diagonal lines -->
        <line x1="10" y1="63" x2="57" y2="110" stroke="white" stroke-width="1.5"/>
        <line x1="18" y1="60" x2="57" y2="99" stroke="white" stroke-width="1.5"/>
        <line x1="26" y1="59" x2="57" y2="90" stroke="white" stroke-width="1.2"/>
        <line x1="10" y1="76" x2="50" y2="116" stroke="white" stroke-width="1.2"/>
        <line x1="34" y1="58" x2="57" y2="81" stroke="white" stroke-width="1.0"/>
        <!-- Bottom-right: lion/figure -->
        <ellipse cx="86" cy="78" rx="10" ry="9" stroke="white" stroke-width="1.2" fill="none"/>
        <path d="M80 84 Q86 95 92 84" stroke="white" stroke-width="1.2" fill="none"/>
        <circle cx="83" cy="75" r="1.5" fill="white"/>
        <circle cx="89" cy="75" r="1.5" fill="white"/>
        <path d="M76 70 L80 74 M96 70 L92 74" stroke="white" stroke-width="1.2"/>
      </svg>
      <div class="login-addu-row">
        <span class="login-word">ADDU</span>
        <div style="width:1px;height:14px;background:rgba(255,255,255,.25);"></div>
        <span class="login-word">NATION</span>
      </div>
    </div>
    <div class="login-body">
      <div class="bio-row">
        <div class="bio-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><path d="M9 3.5a5 5 0 0 1 6.9 4.5" stroke-width="1.5"/></svg>
        </div>
        <div>
          <div class="bio-title">Biometric Login</div>
          <div class="bio-sub">Use Biometric Link to retrieve record</div>
        </div>
        <div class="bio-arr">›</div>
      </div>
      <div class="or-row"><div class="or-line"></div><span class="or-txt">OR LOGIN WITH</span><div class="or-line"></div></div>
      <div class="fgrp">
        <div class="flbl">UNIVERSITY ID / EMAIL</div>
        <div class="inp-wrap">
          <span class="inp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="7" cy="15" r="1" fill="currentColor"/><circle cx="11" cy="15" r="1" fill="currentColor"/></svg></span>
          <input class="inp" type="text" placeholder="20XX-XXXXX" ng-model="lf.id">
        </div>
      </div>
      <div class="fgrp">
        <div class="flbl">PASSWORD <span class="forgot">Forgot?</span></div>
        <div class="inp-wrap">
          <span class="inp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>
          <input class="inp" type="password" placeholder="••••••••" ng-model="lf.pass">
        </div>
      </div>
      <button class="login-btn" ng-click="doLogin()">Log In →</button>
      <div class="login-foot"><span>Need Help?</span><a>Create Account</a></div>
      <div class="role-hint">Continue as:</div>
      <div class="role-sw" style="display:flex;width:100%;">
        <button class="role-btn" style="flex:1;" ng-class="{on:lf.role=='alumni'}" ng-click="lf.role='alumni'">Alumni / User</button>
        <button class="role-btn" style="flex:1;" ng-class="{on:lf.role=='admin'}" ng-click="lf.role='admin'">Admin / Staff</button>
      </div>
    </div>
  </div>
</div>
</script>

<script type="text/ng-template" id="tpl/sidebar.html">
<!-- SIDEBAR -->
  <aside class="sb">
    <div class="sb-head">
      <div class="sb-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#040354" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      </div>
      <div><div class="sb-title">ADDU NATION</div><div class="sb-sub">ALUMNI PLATFORM</div></div>
    </div>

    <nav class="sb-nav">
      <!-- ALUMNI NAV -->
      <div ng-if="role=='alumni'">
        <div class="sb-section">Main</div>
        <div class="sb-link" ng-class="{on:pg=='home'}" ng-click="go('home')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</div>
        <div class="sb-link" ng-class="{on:pg=='network'}" ng-click="go('network')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Network</div>
        <div class="sb-link" ng-class="{on:pg=='donate'}" ng-click="go('donate')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Donate</div>
        <div class="sb-link" ng-class="{on:pg=='career'}" ng-click="go('career')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>Career</div>
        <div class="sb-link" ng-class="{on:pg=='docs'}" ng-click="go('docs')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Documents</div>
        <div class="sb-section">Account</div>
        <div class="sb-link" ng-class="{on:pg=='profile'}" ng-click="go('profile')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</div>
        <div class="sb-link" ng-class="{on:pg=='pledge'}" ng-click="go('pledge')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>Pledge &amp; Automate</div>
        <div class="sb-link" ng-class="{on:pg=='impact'}" ng-click="go('impact')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>My Impact</div>
      </div>
      <!-- ADMIN NAV -->
      <div ng-if="role=='admin'">
        <div class="sb-section">Admin</div>
        <div class="sb-link" ng-class="{on:pg=='home'}" ng-click="go('home')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</div>
        <div class="sb-link" ng-class="{on:pg=='queue'}" ng-click="go('queue')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Queue<span class="sb-pill">5</span></div>
        <div class="sb-link" ng-class="{on:pg=='insights'}" ng-click="go('insights')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Insights</div>
        <div class="sb-link" ng-class="{on:pg=='messages'}" ng-click="go('messages')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Messages</div>
        <div class="sb-section">Account</div>
        <div class="sb-link" ng-class="{on:pg=='profile'}" ng-click="go('profile')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</div>
      </div>
    </nav>

    <div class="sb-foot">
      <div class="sb-user" ng-click="logout()">
        <div class="sb-ava">{{role=='admin'?'JD':'AJ'}}</div>
        <div>
          <div class="sb-uname">{{role=='admin'?'Joo Dan Te':'Alex Johnson'}}</div>
          <div class="sb-urole">{{role=='admin'?'Coordinator':'Class of 2018'}}</div>
        </div>
      </div>
    </div>
  </aside>
</script>

<script type="text/ng-template" id="tpl/topbar.html">
<!-- TOPBAR -->
    <div class="topbar">
      <div class="tb-left">
        <div class="tb-title">{{titles[pg]}}</div>
        <div class="tb-sub">{{subs[pg]}}</div>
      </div>
      <div class="tb-search">
        <span class="tb-search-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" placeholder="Search alumni, causes, jobs..." ng-model="q">
      </div>
      <div class="tb-right">
        <div class="tb-ico-btn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><div class="notif-dot"></div></div>
        <div class="tb-ava">{{role=='admin'?'JD':'AJ'}}</div>
        <div class="role-sw">
          <button class="role-btn" ng-class="{on:role=='alumni'}" ng-click="swRole('alumni')">Alumni</button>
          <button class="role-btn" ng-class="{on:role=='admin'}" ng-click="swRole('admin')">Admin</button>
        </div>
      </div>
    </div>
</script>

<script type="text/ng-template" id="tpl/pages.html">
<!-- ═══════ ALUMNI: HOME ═══════ -->
    <div class="page" ng-class="{on:pg=='home'&&role=='alumni'}">
      <!-- Hero with 3D character space -->
      <div class="hero mb20">
        <div style="position:absolute;top:16px;left:16px;width:38px;height:38px;background:rgba(255,255,255,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
        <div style="position:absolute;top:14px;right:16px;" class="hero-ava">AJ</div>
        <div class="hero-txt" style="padding-top:50px;">
          <div class="hero-welcome">Welcome back,</div>
          <div class="hero-name">Hello,<br>Alex!</div>
          <div class="hero-sub">BS Information Technology · Class of 2018</div>
        </div>
        <div class="hero-char">
          <div class="hero-char-inner"><div class="char-emoji">🧑‍🎓</div></div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="qa-strip mb20">
        <div class="qa-item" ng-click="go('network')"><div class="qa-ico" style="background:#EEF4FF;"><svg viewBox="0 0 24 24" fill="none" stroke="#135BEC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="qa-lbl">Network</div></div>
        <div class="qa-item" ng-click="go('donate')"><div class="qa-ico" style="background:#F0FDF4;"><svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><div class="qa-lbl">Donate</div></div>
        <div class="qa-item" ng-click="go('career')"><div class="qa-ico" style="background:#FFF7ED;"><svg viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div><div class="qa-lbl">Career</div></div>
        <div class="qa-item" ng-click="go('docs')"><div class="qa-ico" style="background:#FAF5FF;"><svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="qa-lbl">Docs</div></div>
        <div class="qa-item"><div class="qa-ico" style="background:#F4F6FA;"><svg viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="qa-lbl">Search</div></div>
      </div>

      <div class="g2">
        <!-- Snapshot -->
        <div>
          <div class="sec-hd"><div class="sec-title">Your Daily Snapshot</div></div>
          <div class="g2">
            <div class="snap-card">
              <div class="snap-tag"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#135BEC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div>
              <div style="font-size:11.5px;color:var(--txt3);margin-bottom:6px;">Jobs for You</div>
              <div class="snap-num">5</div>
              <div class="snap-badge">↑ new matches</div>
            </div>
            <div class="snap-card">
              <div class="snap-tag"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
              <div style="font-size:11.5px;color:var(--txt3);margin-bottom:4px;">Verified Status</div>
              <div style="font-size:15px;font-weight:800;color:var(--txt);margin-bottom:6px;">Profile 95%</div>
              <div class="prog"><div class="prog-fill prog-orange" style="width:95%;"></div></div>
            </div>
          </div>
        </div>
        <!-- Recent Activity -->
        <div>
          <div class="sec-hd"><div class="sec-title">Your Recent Activity</div><div class="see-all">View All</div></div>
          <div class="card" style="padding:4px 16px;">
            <div class="act-row" ng-repeat="a in d.acts">
              <div class="act-ico" style="background:{{a.bg}};">{{a.ico}}</div>
              <div class="f1"><div class="act-title">{{a.title}}</div><div class="act-sub">{{a.sub}}</div></div>
              <div class="act-time">{{a.time}}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════ ALUMNI: NETWORK ═══════ -->
    <div class="page" ng-class="{on:pg=='network'&&role=='alumni'}">
      <div class="chips">
        <div class="chip on">📍 Near Me</div>
        <div class="chip">💡 Industry Experts</div>
        <div class="chip">🎓 Same Batch</div>
      </div>
      <div class="sec-hd"><div class="sec-title">Featured Alumni</div><div class="see-all">View all</div></div>
      <div class="g3">
        <div class="alumni-card" ng-repeat="a in d.network">
          <div class="alumni-ver"><span class="tag t-blue" style="font-size:9px;">✔ VERIFIED</span></div>
          <div class="alumni-ava">{{a.init}}</div>
          <div class="alumni-name">{{a.name}}</div>
          <div class="alumni-role">{{a.role}}</div>
          <div class="alumni-prog">{{a.prog}}</div>
          <div class="alumni-btns">
            <button class="btn btn-navy" style="flex:1;padding:9px 0;font-size:12.5px;">Connect</button>
            <button class="btn btn-outline" style="flex:1;padding:9px 0;font-size:12.5px;">Message</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════ ALUMNI: DONATE ═══════ -->
    <div class="page" ng-class="{on:pg=='donate'&&role=='alumni'}">
      <div class="impact-box">
        <div><div class="impact-lbl">YOUR TOTAL IMPACT</div><div class="impact-val">$1,250.00</div></div>
        <div class="impact-ico-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
      </div>
      <div class="sec-hd mb12"><div class="sec-title">Make an Impact Today</div></div>
      <div class="cat-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:18px;">
        <div class="cat-card" ng-click="dtab='urgent'"><div class="cat-ico">🏪</div><div class="cat-lbl">Alumni Business</div></div>
        <div class="cat-card" ng-click="dtab='student'"><div class="cat-ico">🎓</div><div class="cat-lbl">Student Projects</div></div>
        <div class="cat-card" ng-click="dtab='urgent'"><div class="cat-ico">👥</div><div class="cat-lbl">Community Initiatives</div></div>

          <div class="rev-submitter"><div class="rev-sub-ava">SL</div><div class="f1"><div style="font-size:14px;font-weight:800;">Sarah La</div><div style="font-size:11.5px;color:var(--txt3);">Class of 2012 · BS Marketing</div></div><span class="tag t-blue" style="font-size:9.5px;">✔ VERIFIED ALUMNI</span></div>
          <div class="rev-section">
            <div class="rev-sec-hd"><div class="rev-sec-title"><div class="step-num">1</div>Purpose &amp; Details</div><span class="tag t-green">VERIFIED ●</span></div>
            <div class="rev-body">
              <div class="rev-field-lbl">Campaign Title</div><div class="rev-val">Annual Charity Gala 2024</div>
              <div class="rev-field-lbl">Selected Category</div>
              <div class="rev-act-row"><div class="flex aic gap8"><span style="font-size:18px;">👥</span><div><div style="font-size:13px;font-weight:700;">Community Initiatives</div><div style="font-size:11px;color:var(--txt3);">Selected by applicant</div></div></div><span style="font-size:18px;color:var(--blue);">✔</span></div>
              <div class="rev-field-lbl">Purpose &amp; Description</div><div class="rev-val">This gala aims to raise funds for local scholarships and community outreach programs. We are targeting over 500 attendees from the alumni network to reconnect and give back.</div>
              <div class="rev-field-lbl">Cover Image</div><div class="rev-img-box" style="background:#e8d5c0;"><div style="font-size:13px;color:var(--txt3);">Cover Image Preview</div></div>
            </div>
          </div>
          <div class="rev-section">
            <div class="rev-sec-hd"><div class="rev-sec-title"><div class="step-num">2</div>Set Your Goal</div><span class="tag t-green">VERIFIED ●</span></div>
            <div class="rev-body"><div class="rev-field-lbl">Target Amount ($)</div><div class="rev-val">$ 25,000.00</div><div class="rev-field-lbl">Campaign Deadline</div><div class="rev-val">12/31/2024</div></div>
          </div>
        </div>
        <div>
          <div class="rev-section mb14">
            <div class="rev-sec-hd"><div class="rev-sec-title"><div class="step-num">3</div>Verification Documents</div><span class="tag t-yellow">UNVERIFIED</span></div>
            <div class="rev-body">
              <div class="rev-file-row"><span style="font-size:16px;color:var(--red);">📄</span><div class="f1"><div style="font-weight:600;font-size:13px;">Organization_Permit.pdf</div><div style="font-size:11px;color:var(--txt3);">2.4 MB · Uploaded 2 days ago</div></div><button class="btn btn-blue" style="padding:6px 14px;font-size:12px;">View</button></div>
            </div>
          </div>
          <div class="rev-section mb16">
            <div class="rev-sec-hd"><div class="rev-sec-title"><div class="step-num">4</div>Engagement &amp; Appreciation</div><span class="tag t-green">REVIEWED ●</span></div>
            <div class="rev-body">
              <div class="rev-act-row"><div class="flex aic gap8"><span style="font-size:18px;">🔔</span><div><div style="font-size:13px;font-weight:700;">Real-time Alerts</div><div style="font-size:11px;color:var(--txt3);">User requested notifications</div></div></div><span class="tag t-green">Enabled</span></div>
              <div class="rev-field-lbl" style="margin-top:10px;">Thank You Message</div><div class="rev-val">Thank you so much for your generous support! Your contribution brings us one step closer to our goal.</div>
              <div class="rev-field-lbl">Appreciation Video</div><div class="rev-img-box"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--txt4)" stroke-width="1.5" stroke-linecap="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/><line x1="14" y1="6" x2="18" y2="10"/><line x1="2" y1="22" x2="22" y2="2" stroke="var(--txt4)" stroke-width="1.5"/></svg><div>No video uploaded by applicant</div></div>
            </div>
          </div>
          <div class="flex gap8">
            <button class="btn btn-ghost f1" ng-click="go('queue')">Deny with Feedback</button>
            <button class="btn btn-navy f1" ng-click="go('queue')">Approve &amp; Publish 🚀</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════ ADMIN: INSIGHTS ═══════ -->
    <div class="page" ng-class="{on:pg=='insights'&&role=='admin'}">
      <div class="g4 mb20">
        <div class="ins-stat"><div class="ins-ico">💰</div><div class="ins-lbl">Total Funds</div><div class="ins-val">$124.5k</div><div class="ins-chg" style="color:var(--green2);">+12% ↑</div></div>
        <div class="ins-stat"><div class="ins-ico">👥</div><div class="ins-lbl">New Donors</div><div class="ins-val">342</div><div class="ins-chg" style="color:var(--green2);">+5% ↑</div></div>
        <div class="ins-stat"><div class="ins-ico">📋</div><div class="ins-lbl">Campaigns</div><div class="ins-val">18</div><div class="ins-chg" style="color:var(--txt3);">Active</div></div>
        <div class="ins-stat"><div class="ins-ico">✅</div><div class="ins-lbl">Verified Rate</div><div class="ins-val">94%</div><div class="ins-chg" style="color:var(--green2);">High</div></div>
      </div>
      <div class="g2">
        <div class="chart-card">
          <div class="sec-hd"><div class="sec-title">Donation Trends</div><div style="background:var(--gray-bg);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;color:var(--txt3);">Last 30 Days ▾</div></div>
          <div class="chart-canvas-wrap"><canvas id="trendC"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="sec-hd"><div class="sec-title">Category Breakdown</div><div style="background:var(--gray-bg);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;color:var(--txt3);">This Month ▾</div></div>
          <div class="donut-row">
            <div class="donut-canvas-wrap"><canvas id="donutC"></canvas></div>
            <div class="legend-list">
              <div class="leg-item" ng-repeat="l in d.legend"><div class="leg-lbl"><div class="leg-dot" style="background:{{l.c}};"></div>{{l.l}}</div><div class="leg-pct">{{l.p}}%</div></div>
              <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);"><div style="font-size:11px;color:var(--txt3);">Total</div><div style="font-size:20px;font-weight:900;">100%</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════ ADMIN: MESSAGES ═══════ -->
    <div class="page" ng-class="{on:pg=='messages'&&role=='admin'}">
      <div class="g2" style="align-items:start;">
        <div class="card">
          <div class="sec-hd mb16"><div class="sec-title">Inbox</div><button class="btn btn-blue" style="padding:7px 16px;font-size:12px;">✏️ Compose</button></div>
          <div class="act-row" ng-repeat="m in d.msgs" style="cursor:pointer;">
            <div class="act-ico" style="background:{{m.bg}};border-radius:50%;font-size:14px;font-weight:800;">{{m.init}}</div>
            <div class="f1"><div class="act-title" style="font-weight:{{m.unread?'800':'600'}};">{{m.from}}</div><div class="act-sub">{{m.subject}}</div></div>
            <div style="text-align:right;"><div class="act-time">{{m.time}}</div><span class="tag t-blue" ng-if="m.unread" style="margin-top:4px;display:inline-block;">New</span></div>
          </div>
        </div>
        <div class="card" style="text-align:center;padding:40px;color:var(--txt4);"><div style="font-size:40px;margin-bottom:10px;">✉️</div><div style="font-size:13.5px;font-weight:600;">Select a message to read</div></div>
      </div>
    </div>

    <!-- ═══════ ADMIN: PROFILE (Coordinator) ═══════ -->
    <div class="page" ng-class="{on:pg=='profile'&&role=='admin'}">
      <div class="g2" style="align-items:start;">
        <div>
          <div class="card mb16" style="text-align:center;padding:28px 20px;">
            <div class="prof-ava-wrap" style="margin-bottom:12px;"><div class="prof-ava" style="border-color:#f59e0b;background:linear-gradient(135deg,#d4a820,#b8960c);">JD</div></div>
            <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;"><span class="tag t-orange" style="font-size:9.5px;">✔ VERIFIED</span><span class="tag t-blue" style="font-size:9.5px;">🏛️ UNIVERSITY STAFF</span></div>
            <div class="prof-name">Joo Dan Te</div>
            <div style="font-size:13px;font-weight:800;color:#b45309;letter-spacing:.5px;margin-top:3px;">ALUMNI COORDINATOR</div>
            <div class="prof-sync" style="justify-content:center;margin-top:5px;"><div class="prof-sync-dot"></div>Synced with Registrar 🔄</div>
          </div>
          <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--txt4);text-transform:uppercase;margin-bottom:8px;">ACADEMIC PASSPORT</div>
          <div style="text-align:right;margin-bottom:6px;"><span class="tag t-blue" style="font-size:9.5px;">👁 Staff Only</span></div>
          <div class="pass-card pass-card-gold mb14">
            <div class="pass-verified-row"><div class="pass-uni" style="margin:0;color:rgba(255,255,255,.65);">📄 OFFICIAL DOCUMENT · <strong style="color:rgba(255,255,255,.9);">Ateneo de Davao University</strong></div><div class="pass-lock-tag">🔒 Staff &amp; Employers</div></div>
            <div class="pass-sep"></div>
            <div class="pass-deg-lbl">DEGREE CONFERRED</div>
            <div class="pass-deg">Bachelor of Science in Social Work</div>
            <div class="pass-honors">Magna Cum Laude</div>
            <div class="pass-sep"></div>
            <div class="pass-footer"><div><div class="pass-fl">CLASS OF</div><div class="pass-fv">2018</div></div><div style="text-align:right;"><div class="pass-fl">PASSPORT ID</div><div class="pass-fv">ADDU-2018-0921</div></div></div>
          </div>
          <div class="share-link-row mb16"><span style="font-size:18px;">📱</span><span style="font-size:13.5px;font-weight:600;">Share Verification Link</span></div>
        </div>
        <div>
          <div class="emp-section-lbl mb10">ADDITIONAL CREDENTIALS <span style="float:right;" class="tag t-gray">Employers Only</span></div>
          <div class="card mb14" style="padding:4px 16px;">
            <div class="cred-item" ng-repeat="c in d.creds"><div class="cred-ico">{{c.ico}}</div><div class="f1"><div class="cred-name">{{c.name}}<div class="active-dot" ng-if="c.active"></div></div><div class="cred-iss">{{c.iss}}</div></div><span class="tag t-orange" ng-if="c.pending">PENDING</span></div>
          </div>
          <div class="add-badge-btn mb16">＋ Add External Badge</div>
          <div class="card mb14">
            <div class="sec-title mb12">Settings</div>
            <div class="sett-item" ng-repeat="s in d.settings"><div class="sett-ico"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="{{s.path}}"/></svg></div><div class="sett-lbl">{{s.lbl}}</div><div class="sett-arr"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div></div>
          </div>
          <button class="btn btn-w" style="color:var(--red);border:1.5px solid #fecdd3;background:#fff;padding:12px;" ng-click="logout()">🚪 Log Out</button>
        </div>
      </div>
    </div>
</script>

<!-- ═══════════════════════════════════════
     APP SHELL
═══════════════════════════════════════ -->

<!-- LOGIN -->
<div ng-include="'tpl/login.html'" ng-if="!in" style="width:100%;display:contents;"></div>

<!-- APP -->
<div class="shell" ng-if="in">
  <!-- SIDEBAR -->
  <div ng-include="'tpl/sidebar.html'"></div>

  <!-- MAIN -->
  <div class="main">
    <!-- TOPBAR -->
    <div ng-include="'tpl/topbar.html'"></div>

    <!-- PAGES -->
    <div ng-include="'tpl/pages.html'"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
